<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dddcd6" />
    <title>Praxis</title>
    <script>
      (() => {
        const theme =
          localStorage.getItem("praxis:theme") === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link
      rel="stylesheet"
      href="/src/app/styles/theme.css"
    />
    <style>
      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: var(--paper);
      }

      #praxis-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      #praxis-splash[data-leaving="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .praxis-splash__content {
        width: min(320px, calc(100vw - 48px));
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      .praxis-splash__mark {
        display: block;
        width: 88px;
        height: 88px;
        object-fit: contain;
      }

      .praxis-splash__title {
        margin: 0;
        font-size: 28px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: 0;
      }

      .praxis-splash__message {
        margin: -4px 0 0;
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 20px;
      }

      .praxis-splash__progress {
        width: 160px;
        height: 2px;
        overflow: hidden;
        background: var(--border);
      }

      .praxis-splash__progress::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        background: var(--accent);
        animation: praxis-splash-progress 1.25s ease-in-out infinite;
      }

      @keyframes praxis-splash-progress {
        from {
          transform: translateX(-110%);
        }

        to {
          transform: translateX(350%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #praxis-splash {
          transition: none;
        }

        .praxis-splash__progress::after {
          width: 100%;
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div
      id="praxis-splash"
      role="status"
      aria-live="polite"
      aria-label="Praxis está iniciando"
    >
      <div class="praxis-splash__content">
        <img
          class="praxis-splash__mark"
          src="/assets/praxis-logo-v2.png"
          alt=""
          aria-hidden="true"
        />
        <h1 class="praxis-splash__title">Praxis</h1>
        <p class="praxis-splash__message">Preparando seu espaço de trabalho</p>
        <div
          class="praxis-splash__progress"
          aria-hidden="true"
        ></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (() => {
        const removeSplash = () => {
          const splash = document.getElementById("praxis-splash");

          if (!splash || splash.dataset.leaving === "true") {
            return;
          }

          splash.dataset.leaving = "true";
          window.setTimeout(() => splash.remove(), 220);
        };

        window.addEventListener("praxis:ready", removeSplash, { once: true });
        window.setTimeout(removeSplash, 10000);
      })();
    </script>
  </body>
</html>
